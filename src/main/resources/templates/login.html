<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Email Outreach Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body class="d-flex align-items-center py-4 bg-light" style="background-color: var(--bg-color); min-height: 100vh;">
    <div class="container fade-in">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card glass-card p-4">
                    <div class="text-center mb-4">
                        <div class="h2 fw-bold text-primary"><i class="fa-solid fa-paper-plane me-2"></i>Outreach</div>
                        <p class="text-secondary mt-1">Sign in to manage your campaigns</p>
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger border-0 shadow-sm" role="alert">
                        <i class="fa-solid fa-circle-exclamation me-1"></i> Invalid username or password.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success border-0 shadow-sm" role="alert">
                        <i class="fa-solid fa-circle-check me-1"></i> You have been logged out.
                    </div>
                    <div th:if="${success}" class="alert alert-success border-0 shadow-sm" role="alert">
                        <i class="fa-solid fa-circle-check me-1"></i> <span th:text="${success}"></span>
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-medium">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 text-secondary"><i class="fa-solid fa-user"></i></span>
                                <input type="text" class="form-control border-start-0 ps-0" id="username" name="username" placeholder="Enter username" required autofocus>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label fw-medium">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 text-secondary"><i class="fa-solid fa-lock"></i></span>
                                <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" placeholder="Enter password" required>
                            </div>
                        </div>

                        <div class="d-flex align-items-center justify-content-between mb-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="remember-me" name="remember-me">
                                <label class="form-check-label text-secondary fs-7" for="remember-me">Remember me</label>
                            </div>
                            <a th:href="@{/forgot-password}" class="text-decoration-none fs-7 fw-semibold text-primary">Forgot Password?</a>
                        </div>

                        <button type="submit" class="btn btn-primary btn-primary-grad w-100 py-2 fs-6"><i class="fa-solid fa-right-to-bracket me-2"></i>Sign In</button>
                    </form>

                    <div class="text-center mt-4 border-top pt-3 border-secondary border-opacity-10">
                        <span class="text-secondary fs-7">Don't have an account? </span>
                        <a th:href="@{/register}" class="text-decoration-none fs-7 fw-semibold text-primary">Register here</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
