<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Email Outreach Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body class="d-flex align-items-center py-4 bg-light" style="background-color: var(--bg-color); min-height: 100vh;">
    <div class="container fade-in">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card glass-card p-4">
                    <div class="text-center mb-4">
                        <div class="h2 fw-bold text-primary"><i class="fa-solid fa-key me-2"></i>Forgot Password</div>
                        <p class="text-secondary mt-1">Enter your email to request a reset token</p>
                    </div>

                    <div th:if="${error}" class="alert alert-danger border-0 shadow-sm" role="alert">
                        <i class="fa-solid fa-circle-exclamation me-1"></i> <span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/forgot-password}" method="post">
                        <div class="mb-3">
                            <label for="email" class="form-label fw-medium">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" placeholder="email@example.com" required autofocus>
                        </div>

                        <button type="submit" class="btn btn-primary btn-primary-grad w-100 py-2 fs-6"><i class="fa-solid fa-paper-plane me-2"></i>Send Token</button>
                    </form>

                    <div class="text-center mt-4 border-top pt-3 border-secondary border-opacity-10">
                        <a th:href="@{/login}" class="text-decoration-none fs-7 fw-semibold text-primary">Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
