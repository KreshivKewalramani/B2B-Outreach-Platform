<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="layout(content, title)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Email Outreach Platform</title>
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.5/css/dataTables.bootstrap5.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
    <div class="container-fluid p-0">
        <div class="row g-0">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 sidebar d-flex flex-column p-0">
                <div class="p-4 border-bottom border-secondary border-opacity-25">
                    <span class="fs-4 fw-bold text-white"><i class="fa-solid fa-paper-plane me-2 text-primary"></i>Outreach</span>
                </div>
                <ul class="nav nav-pills flex-column mb-auto mt-4">
                    <li class="nav-item">
                        <a th:href="@{/}" class="nav-link">
                            <i class="fa-solid fa-chart-line me-2"></i> Dashboard
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/companies}" class="nav-link">
                            <i class="fa-solid fa-building me-2"></i> Leads (Companies)
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/templates}" class="nav-link">
                            <i class="fa-solid fa-file-invoice me-2"></i> Email Templates
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/smtp}" class="nav-link">
                            <i class="fa-solid fa-server me-2"></i> SMTP Settings
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/campaigns}" class="nav-link">
                            <i class="fa-solid fa-bullhorn me-2"></i> Campaigns
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/reports}" class="nav-link">
                            <i class="fa-solid fa-chart-pie me-2"></i> Outreach Reports
                        </a>
                    </li>
                </ul>
                <div class="p-3 border-top border-secondary border-opacity-25 mt-auto">
                    <a th:href="@{/profile}" class="nav-link text-white-50 mb-2">
                        <i class="fa-solid fa-user me-2"></i> Profile Settings
                    </a>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-danger w-100"><i class="fa-solid fa-right-from-bracket me-2"></i> Logout</button>
                    </form>
                </div>
            </div>

            <!-- Main Content Area -->
            <div class="col-md-9 col-lg-10 d-flex flex-column min-vh-100">
                <!-- Top Navbar -->
                <nav class="navbar navbar-expand-lg border-bottom px-4 py-3 bg-white" style="background-color: var(--card-bg) !important; backdrop-filter: var(--glass-effect);">
                    <div class="container-fluid p-0">
                        <span class="navbar-brand mb-0 h1 fs-5 fw-semibold text-secondary" th:text="${title}">Page Title</span>
                        <div class="d-flex align-items-center ms-auto">
                            <!-- Dark Mode Toggle Toggle -->
                            <div class="form-check form-switch me-4">
                                <input class="form-check-input" type="checkbox" role="switch" id="themeToggle">
                                <label class="form-check-label text-secondary fs-7" for="themeToggle"><i class="fa-solid fa-moon"></i> Dark Mode</label>
                            </div>
                            <!-- User Session Details -->
                            <div class="dropdown" sec:authorize="isAuthenticated()">
                                <button class="btn btn-link text-decoration-none dropdown-toggle text-dark fw-medium p-0" type="button" data-bs-toggle="dropdown" aria-expanded="false" style="color: var(--text-primary) !important;">
                                    <i class="fa-solid fa-circle-user fa-lg me-1 text-primary"></i> <span sec:authentication="name">User</span>
                                </button>
                                <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0">
                                    <li><a class="dropdown-item" th:href="@{/profile}"><i class="fa-solid fa-user-gear me-2 text-secondary"></i> Settings</a></li>
                                    <li><hr class="dropdown-divider"></li>
                                    <li>
                                        <form th:action="@{/logout}" method="post" class="d-inline">
                                            <button type="submit" class="dropdown-item text-danger"><i class="fa-solid fa-right-from-bracket me-2"></i> Logout</button>
                                        </form>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </nav>

                <!-- Page content container -->
                <div class="p-4 flex-grow-1">
                    <!-- Global success/error messages -->
                    <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm border-0 mb-4" role="alert">
                        <i class="fa-solid fa-circle-check me-2"></i> <span th:text="${success}">Success message</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm border-0 mb-4" role="alert">
                        <i class="fa-solid fa-circle-exclamation me-2"></i> <span th:text="${error}">Error message</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <!-- Inner page target layout replacement -->
                    <div th:replace="${content}"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.5/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.5/js/dataTables.bootstrap5.min.js"></script>
    <!-- ChartJS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom Scripts -->
    <script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
