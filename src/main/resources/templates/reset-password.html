<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Email Outreach Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body class="d-flex align-items-center py-4 bg-light" style="background-color: var(--bg-color); min-height: 100vh;">
    <div class="container fade-in">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card glass-card p-4">
                    <div class="text-center mb-4">
                        <div class="h2 fw-bold text-primary"><i class="fa-solid fa-unlock-keyhole me-2"></i>Reset Password</div>
                        <p class="text-secondary mt-1">Provide your reset token and new password</p>
                    </div>

                    <!-- Flash messages showing token for helper -->
                    <div th:if="${success}" class="alert alert-info border-0 shadow-sm fs-7" role="alert">
                        <i class="fa-solid fa-info-circle me-1"></i> <span th:text="${success}"></span>
                    </div>
                    <div th:if="${error}" class="alert alert-danger border-0 shadow-sm fs-7" role="alert">
                        <i class="fa-solid fa-circle-exclamation me-1"></i> <span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/reset-password}" method="post">
                        <div class="mb-3">
                            <label for="token" class="form-label fw-medium">Reset Token</label>
                            <input type="text" class="form-control" id="token" name="token" th:value="${token}" placeholder="Paste token here" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label fw-medium">New Password</label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Enter new password" required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-primary-grad w-100 py-2 fs-6"><i class="fa-solid fa-check-double me-2"></i>Update Password</button>
                    </form>

                    <div class="text-center mt-4 border-top pt-3 border-secondary border-opacity-10">
                        <a th:href="@{/login}" class="text-decoration-none fs-7 fw-semibold text-primary">Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
